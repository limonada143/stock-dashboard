<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stock Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold border-b border-gray-700 pb-4">📈 My Investment Dashboard</h1>
            <p id="update-date" class="text-gray-400 mt-2">Last Updated: -</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
                <p class="text-sm text-gray-400">총 자산</p>
                <h2 id="total-value" class="text-2xl font-bold text-blue-400">₩0</h2>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
                <p class="text-sm text-gray-400">평가 손익</p>
                <h2 id="total-pnl" class="text-2xl font-bold text-green-400">₩0</h2>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
                <p class="text-sm text-gray-400">수익률</p>
                <h2 id="total-pnl-pct" class="text-2xl font-bold text-yellow-400">0%</h2>
            </div>
        </div>

        <div class="bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-700 mb-10">
            <h3 class="text-xl font-semibold mb-6">자산 비중 (Sector)</h3>
            <div class="w-full h-64 flex justify-center">
                <canvas id="assetChart"></canvas>
            </div>
        </div>

        <div class="bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-700 mb-10">
            <h3 class="text-xl font-semibold mb-2">📈 자산 추이</h3>
            <p class="text-sm text-gray-400 mb-6">날짜별 총 평가금액 변화</p>
            <div class="w-full" style="height: 320px;">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // portfolio.json 데이터를 읽어오는 함수 (다계좌 구조 대응)
        fetch('portfolio.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('update-date').innerText = "Last Updated: " + data.last_updated;
                document.getElementById('total-value').innerText = "₩" + data.summary.total_value.toLocaleString();
                document.getElementById('total-pnl').innerText = "₩" + data.summary.unrealized_pnl.toLocaleString();
                document.getElementById('total-pnl-pct').innerText = data.summary.unrealized_pnl_pct + "%";

                // 전 계좌 종목 합산
                const allHoldings = data.accounts.flatMap(acc => acc.holdings);

                // 도넛 차트 그리기
                const ctx = document.getElementById('assetChart').getContext('2d');
                const colors = [
                    '#60A5FA','#34D399','#FBBF24','#F87171','#A78BFA',
                    '#FB923C','#38BDF8','#4ADE80','#F472B6','#FACC15',
                    '#818CF8','#2DD4BF','#FCA5A5','#86EFAC','#C4B5FD',
                    '#FCD34D','#67E8F9','#FDA4AF','#6EE7B7','#93C5FD'
                ];
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: allHoldings.map(h => h.name),
                        datasets: [{
                            data: allHoldings.map(h => h.current_value),
                            backgroundColor: colors.slice(0, allHoldings.length)
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { labels: { color: 'white', font: { size: 11 } } } }
                    }
                });
            });

        // history.json으로 자산 추이 라인 차트 그리기 (Users + Husband 합산)
        fetch('history.json')
            .then(response => response.json())
            .then(history => {
                // Users / Husband 분리 후 날짜별 합산
                const byDate = {};
                history.forEach(h => {
                    if (!byDate[h.date]) byDate[h.date] = { user: 0, husband: 0 };
                    if (h.note === 'Users') byDate[h.date].user = h.total_value;
                    else if (h.note === 'Husband') byDate[h.date].husband = h.total_value;
                });

                const labels = Object.keys(byDate).sort();
                const userVals    = labels.map(d => byDate[d].user    || null);
                const husbandVals = labels.map(d => byDate[d].husband || null);
                const totalVals   = labels.map(d => (byDate[d].user || 0) + (byDate[d].husband || 0));

                const allVals = totalVals.filter(Boolean);
                const minVal  = Math.min(...allVals);
                const maxVal  = Math.max(...allVals);
                const padding = (maxVal - minVal) * 0.2 || 5000000;

                const trendCtx = document.getElementById('trendChart').getContext('2d');
                new Chart(trendCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: '합산 총 자산',
                                data: totalVals,
                                borderColor: '#60A5FA',
                                backgroundColor: 'rgba(96, 165, 250, 0.08)',
                                pointBackgroundColor: '#60A5FA',
                                pointRadius: 5,
                                pointHoverRadius: 8,
                                borderWidth: 2.5,
                                fill: true,
                                tension: 0.3
                            },
                            {
                                label: 'User',
                                data: userVals,
                                borderColor: '#34D399',
                                backgroundColor: 'transparent',
                                pointBackgroundColor: '#34D399',
                                pointRadius: 4,
                                pointHoverRadius: 7,
                                borderWidth: 1.8,
                                borderDash: [4, 3],
                                tension: 0.3,
                                spanGaps: true
                            },
                            {
                                label: 'Husband',
                                data: husbandVals,
                                borderColor: '#F472B6',
                                backgroundColor: 'transparent',
                                pointBackgroundColor: '#F472B6',
                                pointRadius: 4,
                                pointHoverRadius: 7,
                                borderWidth: 1.8,
                                borderDash: [4, 3],
                                tension: 0.3,
                                spanGaps: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                ticks: { color: '#9CA3AF' },
                                grid: { color: 'rgba(255,255,255,0.05)' }
                            },
                            y: {
                                min: Math.max(0, minVal - padding),
                                max: maxVal + padding,
                                ticks: {
                                    color: '#9CA3AF',
                                    callback: val => Math.round(val / 10000).toLocaleString() + '만'
                                },
                                grid: { color: 'rgba(255,255,255,0.05)' }
                            }
                        },
                        plugins: {
                            legend: { labels: { color: 'white' } },
                            tooltip: {
                                callbacks: {
                                    label: ctx => ctx.dataset.label + ': ₩' + (ctx.parsed.y || 0).toLocaleString()
                                }
                            }
                        }
                    }
                });
            });
    </script>
</body>
</html>
